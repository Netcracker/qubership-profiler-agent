# Example: compactor with cloud integration storage class (STORAGE_RWX_CLASS)
#
# When deploying via cloud platform (App Deployer / cloud integration),
# set STORAGE_RWX_CLASS and global.cloudIntegrationEnabled to provision
# the compactor PVC using the platform-managed shared storage class.
#
# STORAGE_RWX_CLASS takes precedence over compactor.pvc.spec.storageClassName
# when global.cloudIntegrationEnabled is true.

STORAGE_RWX_CLASS: "nfs-storage"

global:
  cloudIntegrationEnabled: true

compactor:
  pvc:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi

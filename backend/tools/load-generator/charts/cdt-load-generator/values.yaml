global:
  name: cdt-loader
  metricsPort: 5656
  # k6 REST API; the run orchestrator scales VUs through it.
  restPort: 6565
  prometheusRW: true

deployment:
  image: ""

  # Everything scripts/scenario.js reads; workload knobs beyond these defaults
  # come from the frozen run spec (doc/run-orchestration.md).
  env:
    COLLECTOR_HOST: profiler-backend-collector-agent.profiler-load.svc
    COLLECTOR_PORT: "1715"
    EMULATOR_NAMESPACE: load
    EMULATOR_SERVICE: load-svc
    PODS_PER_VU: "1"
    MAX_VUS: "600"
    DURATION: 2h
    TESTID: dev

  # Used only when prometheusRW = true
  envRW:
    K6_PROMETHEUS_RW_SERVER_URL: ""
    K6_PROMETHEUS_RW_PUSH_INTERVAL: 10s
    K6_PROMETHEUS_RW_TREND_STATS: min,max,avg,p(90),p(95)

  # Used only when prometheusRW = true
  secretEnvRW:
    K6_PROMETHEUS_RW_USERNAME: admin
    K6_PROMETHEUS_RW_PASSWORD: admin

ingress:
  enabled: true
  host: ""

grafanaDashboard:
  enabled: true

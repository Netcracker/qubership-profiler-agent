apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.name }}-service
  labels:
    app.kubernetes.io/name: {{ .Values.global.name }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.global.name }}
  ports:
    - name: metrics
      protocol: TCP
      port: {{ .Values.global.metricsPort }}
      targetPort: {{ .Values.global.metricsPort }}
    # The k6 REST API the run orchestrator scales VUs through.
    - name: rest
      protocol: TCP
      port: {{ .Values.global.restPort }}
      targetPort: {{ .Values.global.restPort }}
  type: ClusterIP
# T7.3 agent↔collector network faults (load-testing-plan.md §7.7, runbook
# doc/fault-runs.md): the accelerated-soak shape on the `local-faults` stand,
# where the write fleet dials the collector through the toxiproxy `agent`
# proxy. Three injections probe the socket deadlines and the post-blip storm:
#
#   1. latency 2 s on the agent path — inside the 40 s read deadline, the
#      session must survive (ack drains slow down, ack_flush_time grows);
#   2. a full stall (timeout toxic, no data through) — the collector's 40 s
#      read deadline and the agent-side 30 s ack wait must tear the sessions
#      down instead of leaving them half-dead;
#   3. lifting the stall (the revert) — the whole fleet reconnects at once:
#      the reconnect storm after a network blip.
#
# Packet loss proper needs netem (chaos-mesh, parked) and stays
# cluster-pending; a TCP proxy cannot drop individual packets.
run:
  name: t7-agent-net
  testid: CHANGE-ME              # unique per run; must equal the k6 deployment's TESTID
outputs: runs/

endpoints:
  k6: http://localhost:6565
  vm: http://localhost:8429
  collector: http://localhost:8081
  toxiproxy: http://localhost:8474

images:
  backend: CHANGE-ME             # profiler-backend@sha256:...
  runner: CHANGE-ME              # cdt-load-generator@sha256:...
helmValues: ./values-snapshot.yaml

workload:                        # the accelerated-soak shape; complete freeze
  PODS_PER_VU: "1"
  THREADS_PER_POD: "8"
  CALLS_PER_SEC: "3"
  DICT_INITIAL: "2000"
  DICT_GROWTH_PER_MIN: "10"
  DURATION_THRESHOLDS: "100ms,1s,10s"
  DURATION_SHARES: "0.90,0.07,0.025,0.005"
  STACK_DEPTH: "10"
  SQL_SHARE: "0.2"
  SQL_BYTES: "1024"
  SQL_DEDUP: "0.9"
  XML_SHARE: "0.05"
  XML_BYTES: "4096"
  SUSPEND_RATE: "0.5"
  ERROR_SHARE: "0.01"
  REQUEST_ID_SHARE: "1"
  CPU_FRACTION: "0"
  WAIT_FRACTION: "0"
  MEMORY_BYTES: "4096"
  SEED: "1"
  START_SPREAD: "2s"
  RESTART_INTERVAL: "10s"
  CHURN_INTERVAL: "0s"

ramp:
  levels: [20]
  confirm:
    timeout: 3m
    ingest:
      # From the phase-5 calibration smoke (runs/20260717T085030Z-t4-cal-3cps).
      bytesPerVU: 19800
      tolerance: 0.25
  hold:
    min: 1h
    max: 1h
    sample: 15s
    plateau:
      window: 2m
      slopeTolerance: 0.05
      series:
        ingest-bytes: sum(rate(profiler_ingest_bytes_total{namespace="profiler-load"}[1m]))
        collector-rss: sum(container_memory_working_set_bytes{namespace="profiler-load", pod=~".*collector.*", container!=""})

faults:
  - name: agent-latency
    at: 15m
    action: toxics
    target: {proxy: agent}
    toxics:
      - {type: latency, attributes: {latency: 2000, jitter: 500}}
    duration: 10m
    # Sessions survive 2 s of latency (the 40 s read deadline holds), but
    # the first run MEASURED an ~40x ingest collapse: 8 KB socket buffers
    # plus the synchronous per-stream ack drain make the wire protocol
    # latency-bound (ack-flush p95 ~2.1 s, ingest 440 -> 11 KB/s). The
    # collapse starves the hot window, so its lag and freshness are
    # declared; and the late-arriving data re-opens already-sealed buckets,
    # multiplying per-bucket file counts (41-186 objects vs ~20 steady on
    # the 2026-07-18 run) — compaction legitimately falls behind the
    # accelerated deadlines while digesting them. A reconnect wave under
    # plain latency is still a finding.
    expects: [freshness, markers, hot-window-lag, compaction-lag, small-file-share]
    settle: 15m
  - name: agent-stall
    at: 35m
    action: toxics
    target: {proxy: agent}
    toxics:
      - {type: timeout, attributes: {timeout: 0}}   # hold connections, pass no data
    duration: 5m
    # The stall starves every session: reads time out on both sides, data
    # stops, and the revert releases the reconnect storm — plus the same
    # late-data seal burst and compaction digestion as the latency window.
    expects: [freshness, markers, hot-window-lag, ingest-paused, scrape-gap,
              compaction-lag, small-file-share]
    settle: 15m

detectors:
  - name: ingest-paused
    kind: sticky-share
    share: 0.01
    query: max(profiler_backpressure_ingest_paused{namespace="profiler-load"})
  - name: refused-bytes
    kind: nonzero
    query: sum(rate(profiler_ingest_refused_bytes_total{namespace="profiler-load"}[1m]))
  - name: pending-parquet-growth
    kind: monotonic-growth
    minGrowth: 0.10
    grace: 5m
    minValue: 8388608
    query: sum(profiler_hotstore_pending_parquet_bytes{namespace="profiler-load"})
  - name: hot-window-lag
    kind: nonzero
    grace: 5m
    query: max(profiler_hotstore_hot_window_lag_seconds{namespace="profiler-load"}) > bool 420
  - name: ack-errors
    kind: nonzero
    query: sum(rate(k6_vdumper_ack_errors_total{testid="CHANGE-ME"}[1m]))

context:
  reconnects: sum(rate(k6_vdumper_reconnects_total{testid="CHANGE-ME"}[1m]))
  tcp-connect-p95: max(k6_vdumper_tcp_connect_time_p95{testid="CHANGE-ME"})
  session-ready-p95: max(k6_vdumper_session_ready_time_p95{testid="CHANGE-ME"})
  ack-flush-p95: max(k6_vdumper_ack_flush_time_p95{testid="CHANGE-ME"})
  active-connections: sum(profiler_ingest_active_connections{namespace="profiler-load"})
  connects-rate: sum(rate(profiler_ingest_connects_total{namespace="profiler-load"}[1m]))
  disconnects-rate: sum(rate(profiler_ingest_disconnects_total{namespace="profiler-load"}[1m]))
  dropped-chunks: sum(rate(k6_vdumper_dropped_chunks_total{testid="CHANGE-ME"}[1m]))
  hot-window-lag-value: max(profiler_hotstore_hot_window_lag_seconds{namespace="profiler-load"})
  collector-cpu: sum(rate(container_cpu_usage_seconds_total{namespace="profiler-load", pod=~".*collector.*", container!=""}[1m]))

guard:
  generator-cpu:
    query: sum(rate(container_cpu_usage_seconds_total{namespace="profiler-load", pod=~"cdt-loader.*", container!=""}[1m]))
    limitCores: 2.0
    maxShare: 0.7

pprof:
  points: [1.0]
  seconds: 30
  profiles: [profile, heap, goroutine]

suite: dumps-collector gateway ingress
templates:
  - templates/ingress.yaml
capabilities:
  apiVersions:
    - networking.k8s.io/v1
release:
  name: test
  namespace: test-ns
tests:
  - it: legacy-ingress default renders Ingress
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: legacy-ingress
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - equal:
          path: spec.rules[0].host
          value: dumps-collector-test-ns.example.com

  - it: gateway-api-default renders no Ingress
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: gateway-api-default
    asserts:
      - hasDocuments:
          count: 0

  - it: dual-publish renders Ingress with ignore annotation
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: legacy-ingress,gateway-api-default
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.annotations["gateway-api-converter.netcracker.com/ignore"]
          value: "true"
      - equal:
          path: spec.rules[0].host
          value: dumps-collector-test-ns.example.com

  - it: null GATEWAY_SYSTEM_TYPE falls back to legacy Ingress
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: null
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress

  - it: empty GATEWAY_SYSTEM_TYPE falls back to legacy Ingress
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: ""
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress

---
suite: dumps-collector gateway httproute
templates:
  - templates/httproute.yaml
release:
  name: test
  namespace: test-ns
tests:
  - it: legacy-ingress renders no HTTPRoute
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: legacy-ingress
    asserts:
      - hasDocuments:
          count: 0

  - it: gateway-api-default renders HTTPRoute with eg hostname
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: gateway-api-default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.hostnames[0]
          value: dumps-collector-test-ns.eg.example.com
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: cloud-profiler-dumps-collector
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080

  - it: dual-publish renders HTTPRoute with distinct hostname
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: legacy-ingress,gateway-api-default
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.hostnames[0]
          value: dumps-collector-test-ns.eg.example.com

  - it: TLS enabled renders Backend and Envoy backendRef
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: gateway-api-default
      tlsConfig.generateCerts.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - documentSelector:
          path: kind
          value: HTTPRoute
        equal:
          path: spec.rules[0].backendRefs[0].group
          value: gateway.envoyproxy.io
      - documentSelector:
          path: kind
          value: HTTPRoute
        equal:
          path: spec.rules[0].backendRefs[0].kind
          value: Backend
      - documentSelector:
          path: kind
          value: Backend
        equal:
          path: spec.tls.insecureSkipVerify
          value: true

  - it: null GATEWAY_SYSTEM_TYPE renders no HTTPRoute
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: null
    asserts:
      - hasDocuments:
          count: 0

  - it: empty GATEWAY_SYSTEM_TYPE renders no HTTPRoute
    set:
      NAMESPACE: test-ns
      CLOUD_PUBLIC_HOST: example.com
      GATEWAY_SYSTEM_TYPE: ""
    asserts:
      - hasDocuments:
          count: 0

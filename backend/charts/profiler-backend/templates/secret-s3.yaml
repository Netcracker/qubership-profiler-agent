{{- if not .Values.s3.auth.existingSecret }}
{{- if or (not .Values.s3.auth.accessKey) (not .Values.s3.auth.secretKey) }}
{{- fail "set s3.auth.existingSecret, or both s3.auth.accessKey and s3.auth.secretKey" }}
{{- end }}
# Chart-managed credentials Secret — dev/smoke convenience. Production should
# pass s3.auth.existingSecret so the values never enter Helm release state.
# All workloads consume it as a mounted volume, never as env (04 §6).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "profiler-backend.s3SecretName" . }}
  labels:
    {{- include "profiler-backend.labels" (dict "root" . "component" "s3") | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ .Values.s3.auth.accessKey | quote }}
  secret-key: {{ .Values.s3.auth.secretKey | quote }}
{{- end }}

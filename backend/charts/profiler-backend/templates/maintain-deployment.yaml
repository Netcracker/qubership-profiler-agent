{{- if not (has .Values.maintain.mode (list "deployment" "cronjob")) }}
{{- fail (printf "maintain.mode must be \"deployment\" or \"cronjob\", got %q — an unsupported value would silently render no maintainer, dropping retention and compaction (PR 708 review #13)" .Values.maintain.mode) }}
{{- end }}
{{- if eq .Values.maintain.mode "deployment" }}
# Singleton maintenance loop (03-lifecycle.md §8.1). One replica is enough —
# and correct: two maintainers PUT identical objects (deterministic keys), so
# this is an optimization, not a lock.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "profiler-backend.fullname" . }}-maintain
  labels:
    {{- include "profiler-backend.labels" (dict "root" . "component" "maintain") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "profiler-backend.selectorLabels" (dict "root" . "component" "maintain") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "profiler-backend.labels" (dict "root" . "component" "maintain") | nindent 8 }}
    spec:
      securityContext:
        {{- include "profiler-backend.podSecurityContext" (dict "root" . "component" "maintain") | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: profiler-backend
          image: {{ include "profiler-backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["maintain"]
          securityContext:
            {{- include "profiler-backend.containerSecurityContext" (dict "root" . "component" "maintain") | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.maintain.metricsPort }}
              protocol: TCP
          env:
            - name: PROFILER_MAINTAIN_CHECK_INTERVAL
              value: {{ .Values.maintain.checkInterval | quote }}
            - name: PROFILER_METRICS_PORT
              value: {{ .Values.maintain.metricsPort | quote }}
            {{- include "profiler-backend.maintainEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            {{- include "profiler-backend.s3CredentialMount" . | nindent 12 }}
            {{- include "profiler-backend.s3TlsMount" . | nindent 12 }}
          resources:
            {{- toYaml .Values.maintain.resources | nindent 12 }}
      volumes:
        {{- include "profiler-backend.s3CredentialVolume" . | nindent 8 }}
        {{- include "profiler-backend.s3TlsVolume" . | nindent 8 }}
{{- end }}

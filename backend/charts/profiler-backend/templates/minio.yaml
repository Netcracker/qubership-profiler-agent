{{- if .Values.minio.enabled }}
# Dev/smoke MinIO. Storage is an emptyDir — the objects die with the pod; the
# profiler services recreate the bucket on connect. Root credentials come from
# the same mounted Secret via MinIO's *_FILE convention, so nothing leaks into
# the pod spec here either.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "profiler-backend.fullname" . }}-minio
  labels:
    {{- include "profiler-backend.labels" (dict "root" . "component" "minio") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "profiler-backend.selectorLabels" (dict "root" . "component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "profiler-backend.labels" (dict "root" . "component" "minio") | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          args: ["server", "/data", "--console-address", ":{{ .Values.minio.consolePort }}"]
          env:
            - name: MINIO_ROOT_USER_FILE
              value: {{ printf "%s/access-key" .Values.s3.auth.mountPath }}
            - name: MINIO_ROOT_PASSWORD_FILE
              value: {{ printf "%s/secret-key" .Values.s3.auth.mountPath }}
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: {{ .Values.minio.consolePort }}
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 2
            periodSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
            {{- include "profiler-backend.s3CredentialMount" . | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
        {{- include "profiler-backend.s3CredentialVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "profiler-backend.fullname" . }}-minio
  labels:
    {{- include "profiler-backend.labels" (dict "root" . "component" "minio") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "profiler-backend.selectorLabels" (dict "root" . "component" "minio") | nindent 4 }}
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: {{ .Values.minio.consolePort }}
      targetPort: console
{{- end }}

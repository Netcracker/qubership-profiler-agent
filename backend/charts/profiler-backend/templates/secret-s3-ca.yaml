{{- if and .Values.s3.tls.caCert (not .Values.s3.tls.existingSecret) }}
# Chart-managed CA bundle — dev/smoke convenience. Production should pass
# s3.tls.existingSecret so the certificate never enters Helm release state.
# All workloads consume it as a mounted volume (S3_CA_FILE), never as env.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "profiler-backend.s3TlsSecretName" . }}
  labels:
    {{- include "profiler-backend.labels" (dict "root" . "component" "s3-ca") | nindent 4 }}
type: Opaque
stringData:
  ca.crt: {{ .Values.s3.tls.caCert | quote }}
{{- end }}

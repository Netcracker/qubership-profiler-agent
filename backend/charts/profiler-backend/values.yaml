# Default values for the profiler-backend chart.
#
# Portability: the defaults carry no kind- or OrbStack-specific assumptions.
# The two knobs that differ between local clusters are Helm values only:
#   - collector.storage.storageClassName / minio.storage.storageClassName
#     (empty = the cluster's default StorageClass)
#   - collector.agentService.type (ClusterIP everywhere; NodePort for kind
#     port-mappings; LoadBalancer on OrbStack, which ships a built-in LB)

image:
  registry: ""
  repository: profiler-backend
  tag: dev
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

s3:
  # Endpoint URL; an https:// scheme enables TLS. Leave empty with
  # minio.enabled=true to use the in-cluster dev MinIO.
  endpoint: ""
  bucket: profiler-data
  # Object-key prefix below the bucket (S3_PATH_PREFIX), applied to EVERY key
  # the backend writes and reads — parquet and the pods manifests — so several
  # deployments can share one bucket. Empty keeps the keys at the bucket root.
  pathPrefix: ""
  auth:
    # Name of an existing Secret with keys `access-key` and `secret-key`.
    # Takes precedence over the inline pair below.
    existingSecret: ""
    # Inline credentials render into a chart-managed Secret — dev/smoke only.
    accessKey: ""
    secretKey: ""
    # Where the workloads mount the Secret; S3_ACCESS_KEY_FILE and
    # S3_SECRET_KEY_FILE point into this directory. The credentials are never
    # injected as env (01-write-contract.md §9, 04 §6).
    mountPath: /etc/profiler/s3
  tls:
    # PEM CA bundle trusted in addition to the image's system store, for an
    # S3 endpoint whose certificate a private/internal CA signed. Renders
    # into a chart-managed Secret, dev/smoke only, like s3.auth.accessKey
    # above. Production should use existingSecret instead.
    caCert: ""
    # Name of an existing Secret with the CA bundle under key `ca.crt`.
    # Takes precedence over the inline caCert above.
    existingSecret: ""
    # Where the workloads mount the CA bundle; S3_CA_FILE points at
    # <mountPath>/ca.crt.
    mountPath: /etc/profiler/s3-ca
    # Skip TLS certificate verification for the S3 endpoint entirely. A
    # dev/smoke escape hatch for a self-signed endpoint with no CA to hand —
    # never enable it in production: it defeats TLS.
    insecureSkipVerify: false

collector:
  replicas: 2
  agentPort: 1715
  internalPort: 8081
  # Must cover the 03-lifecycle.md §5.4 shutdown budget (~95 s).
  terminationGracePeriodSeconds: 100
  storage:
    # PV capacity formula (04 §3.5): size ≥ chunksStagingMaxBytes (the
    # trace/sql/xml segment budget) + PROFILER_PENDING_UPLOAD_MAX_BYTES (the
    # ingest gate covering pending parquet + call partitions + WAL files,
    # 2GB default) + headroom for the seal scratch, hot-retention parquet
    # (~1GB), and the recovered pod-restarts' WALs the gate does not track.
    # A budget-sized PVC hits ENOSPC before eviction or the gate engages.
    size: 20Gi
    # Empty string omits storageClassName, selecting the cluster's default
    # StorageClass (kind: local-path; OrbStack: its default). An explicit ""
    # in the PVC would mean "no dynamic provisioning" — the template never
    # renders that.
    storageClassName: ""
  chunksStagingMaxBytes: 10GB
  hotRetention: 15m
  # L4 entry point for agent TCP (port 1715). Per-connection stickiness is
  # inherent to TCP; client-IP affinity is not needed — an agent reconnect is
  # a fresh pod-restart by design (04 §3.4).
  agentService:
    type: ClusterIP
    # Optional fixed nodePort when type=NodePort (empty = auto-assign).
    nodePort: ""
  # Extra environment (name → value), e.g. PROFILER_SEAL_CHECK_INTERVAL: 2s
  env: {}
  # fsGroup (defaults to 65532, the image's uid:gid) is what makes the /data
  # PVC group-writable by the non-root container — omitting it mounts the
  # volume owned by root and the collector can't write to it.
  securityContext: {}
  containerSecurityContext: {}
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

query:
  replicas: 2
  port: 8080
  # 03-lifecycle.md §7.3 shutdown budget.
  terminationGracePeriodSeconds: 45
  env: {}
  securityContext: {}
  containerSecurityContext: {}
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  # External routing to /api/v1 (04 §12). Disabled by default: the query
  # Service stays ClusterIP-only until an operator opts in. GATEWAY_SYSTEM_TYPE
  # below picks Ingress, HTTPRoute, or both — this one flag gates either.
  ingress:
    enabled: false
    className: ""
    # Falls back to "<fullname>-query-<namespace>.<CLOUD_PUBLIC_HOST>". Outside
    # a Qubership-managed cluster CLOUD_PUBLIC_HOST is never populated, so set
    # this host explicitly — enabling the Ingress without either errors at
    # render rather than emitting an invalid "…-query-." host.
    host: ""
    annotations: {}
    tls: []
  httpRoute:
    # Falls back to "<fullname>-query-<namespace>.eg.<CLOUD_PUBLIC_HOST>" —
    # same caveat and same fail-fast as query.ingress.host above.
    host: ""
  # Base URL of a dumps-collector deployment (netcracker/qubership-profiler
  # dumps-collector chart), so the Pods Info screen can link out to its
  # thread/top dump download for a pod-restart. dumps-collector is a separate
  # deployment with its own ingress — there is no in-cluster way to derive
  # this, so it stays empty (dump link-out disabled) unless set explicitly,
  # scheme included, e.g.
  # "https://dumps-collector-<namespace>.<cloud-public-host>" (matching the
  # dumps-collector chart's own default ingress host convention).
  dumpsCollectorUrl: ""

maintain:
  # cronjob: one pod per run (batch/v1 CronJob, --run-now).
  # deployment: singleton loop pod; the only mode with a /metrics surface.
  mode: cronjob
  schedule: "0 * * * *"
  # PROFILER_MAINTAIN_CHECK_INTERVAL for deployment mode.
  checkInterval: 5m
  metricsPort: 8081
  env: {}
  securityContext: {}
  containerSecurityContext: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Per-class retention TTLs (01-write-contract.md §6.4, §9), consumed by the
# maintain workload. The defaults mirror the shared tier table (№10):
# short_clean <100ms, normal_clean 0.1–1s, long_clean 1–10s, huge_clean ≥10s,
# any_error regardless of duration. podsTTL expires the pods/v1 identity
# manifests and must exceed the longest class TTL.
retention:
  # Clean-tier duration thresholds (PROFILER_DURATION_THRESHOLDS), e.g.
  # "100ms,1s,10s". Rendered into BOTH the collector and query workloads from
  # this one key: the collector classifies rows with it at write time and
  # query prunes cold classes with it at read time, so a drift between the
  # two silently drops rows. Empty keeps the built-in tier-table defaults in
  # both binaries. Override the TTLs above together with this.
  durationThresholds: ""
  shortCleanTTL: 2d
  normalCleanTTL: 7d
  longCleanTTL: 30d
  hugeCleanTTL: 180d
  anyErrorTTL: 180d
  corruptedTTL: 7d
  podsTTL: 185d

# In-cluster MinIO for dev and smoke runs. Storage is an emptyDir — data dies
# with the pod. Point s3.endpoint at a real object store for anything else.
minio:
  enabled: false
  image: minio/minio:latest
  consolePort: 9001

metrics:
  serviceMonitor:
    # Requires the monitoring.coreos.com CRDs (prometheus-operator).
    enabled: false
    interval: 30s
    additionalLabels: {}
  prometheusRule:
    enabled: false
    additionalLabels: {}

############# Gateway API (04 §12) #############
#
# These six globals are a Qubership cloud-platform convention (PR #798),
# normally injected by the cluster's deployer rather than set by hand. Outside
# that platform, leave GATEWAY_SYSTEM_TYPE at its default and set
# query.ingress.host / query.httpRoute.host explicitly instead of relying on
# NAMESPACE / CLOUD_PUBLIC_HOST to derive a host.

# Comma-separated gateway mode flags: legacy-ingress, gateway-api-default.
# Both together render an Ingress and an HTTPRoute side by side, for a
# cluster's migration window off Ingress-NGINX.
GATEWAY_SYSTEM_TYPE: legacy-ingress
GATEWAY_SYSTEM_NAMESPACE: gateway-system
GATEWAY_SYSTEM_NAME: default-external-gateway

# Blue/green (BGD2): when PEER_NAMESPACE is set, the HTTPRoute parentRef
# targets the edge-router Gateway in CONTROLLER_NAMESPACE instead.
PEER_NAMESPACE: ""
CONTROLLER_NAMESPACE: ""

# Namespace and public-DNS suffix used only to derive default Ingress/
# HTTPRoute hosts (see query.ingress.host / query.httpRoute.host above).
NAMESPACE: ""
CLOUD_PUBLIC_HOST: ""

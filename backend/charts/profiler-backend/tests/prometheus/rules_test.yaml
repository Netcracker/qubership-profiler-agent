# promtool unit tests for files/prometheus-rules.yaml (run via
# `make rules-test`). The forced-quarantine scenario is the Stage 1 deploy
# acceptance check: a stuck quarantine must page, an empty one must not.
rule_files:
  - ../../files/prometheus-rules.yaml

evaluation_interval: 1m

tests:
  # Forced quarantine: two parquet files land in upload-failed/ at t=6m and
  # stay. The alert must hold its 15m `for` window and then fire; it must NOT
  # fire while the window is still open.
  - interval: 1m
    input_series:
      - series: 'profiler_hotstore_quarantine_objects{kind="parquet"}'
        values: "0x5 2x40"
    alert_rule_test:
      - eval_time: 10m
        alertname: ProfilerStuckQuarantine
        exp_alerts: [] # non-zero for only 4m — the 15m for-window is open
      - eval_time: 25m
        alertname: ProfilerStuckQuarantine
        exp_alerts:
          - exp_labels:
              kind: parquet
              severity: warning
            exp_annotations:
              summary: "Objects stuck in upload quarantine"
              description: "parquet objects sit in upload-failed/ awaiting manual resolution; while they wait, hot-tier cleanup behind them is pinned."

  # A quarantine that never fills must never page.
  - interval: 1m
    input_series:
      - series: 'profiler_hotstore_quarantine_objects{kind="parquet"}'
        values: "0x60"
    alert_rule_test:
      - eval_time: 30m
        alertname: ProfilerStuckQuarantine
        exp_alerts: []
      - eval_time: 60m
        alertname: ProfilerQuarantineAgeHigh
        exp_alerts: []

  # Age escalation: the oldest quarantined object crosses one hour.
  - interval: 1m
    input_series:
      - series: 'profiler_hotstore_quarantine_oldest_age_seconds{kind="parquet"}'
        values: "0+60x80" # ages one minute per minute from t=0
    alert_rule_test:
      - eval_time: 55m
        alertname: ProfilerQuarantineAgeHigh
        exp_alerts: []
      - eval_time: 70m
        alertname: ProfilerQuarantineAgeHigh
        exp_alerts:
          - exp_labels:
              kind: parquet
              severity: critical
            exp_annotations:
              summary: "Upload quarantine unresolved for over an hour"
              description: "The oldest quarantined parquet object has waited over an hour; the collector PV keeps accumulating state it cannot release."

  # Disk budget: 9.5 GB used against a 10 GB budget crosses the 90% line.
  - interval: 1m
    input_series:
      - series: "profiler_hotstore_segments_disk_bytes"
        values: "9500000000x30"
      - series: "profiler_hotstore_segments_disk_budget_bytes"
        values: "10000000000x30"
    alert_rule_test:
      - eval_time: 15m
        alertname: ProfilerDiskBudgetNearFull
        exp_alerts:
          - exp_labels:
              severity: warning
            exp_annotations:
              summary: "Hot-store segments near the disk budget"
              description: "Segment files exceed 90% of PROFILER_CHUNKS_STAGING_MAX_BYTES; the janitor will start evicting segments and calls will seal with truncated_reason=disk_budget."

  # Loop errors: the seal loop climbs by one failure per minute (well over the
  # 3-in-15m threshold), the other two loops stay flat. The alert must fire
  # after its 10m for-window, and NOT while only a couple of failures have
  # accrued.
  - interval: 1m
    input_series:
      - series: "profiler_seal_loop_errors_total"
        values: "0+1x40"
      - series: "profiler_upload_loop_errors_total"
        values: "0x40"
      - series: "profiler_janitor_loop_errors_total"
        values: "0x40"
    alert_rule_test:
      - eval_time: 5m
        alertname: ProfilerLoopErrors
        exp_alerts: [] # only ~5 failures and the 10m for-window is still open
      - eval_time: 30m
        alertname: ProfilerLoopErrors
        exp_alerts:
          - exp_labels:
              severity: warning
            exp_annotations:
              summary: "A collector maintenance loop keeps failing"
              description: "The seal, upload, or janitor loop logged repeated pass failures over the last 15 minutes; the hot→cold handoff may be stalling."

  # A healthy pipeline with the occasional single failed pass must never page.
  - interval: 1m
    input_series:
      - series: "profiler_seal_loop_errors_total"
        values: "0 0 0 1 1x36"
      - series: "profiler_upload_loop_errors_total"
        values: "0x40"
      - series: "profiler_janitor_loop_errors_total"
        values: "0x40"
    alert_rule_test:
      - eval_time: 30m
        alertname: ProfilerLoopErrors
        exp_alerts: []

  # Ingest refusals: the gate starts refusing at t=10m and the counter climbs;
  # the alert fires once the 5m for-window closes, and a collector that never
  # refuses must never page.
  - interval: 1m
    input_series:
      - series: "profiler_ingest_refused_bytes_total"
        values: "0x10 1024+1024x30"
    alert_rule_test:
      - eval_time: 5m
        alertname: ProfilerIngestRefused
        exp_alerts: [] # nothing refused yet
      - eval_time: 20m
        alertname: ProfilerIngestRefused
        exp_alerts:
          - exp_labels:
              severity: critical
            exp_annotations:
              summary: "Collector is refusing agent data — the agent drops it"
              description: "The backpressure gate answered ACK_ERROR to agent RCV_DATA; the agent drops the refused window and reconnects, so this data is lost. Check S3 upload health and PROFILER_PENDING_UPLOAD_MAX_BYTES."
  - interval: 1m
    input_series:
      - series: "profiler_ingest_refused_bytes_total"
        values: "0x40"
    alert_rule_test:
      - eval_time: 30m
        alertname: ProfilerIngestRefused
        exp_alerts: []

  # Upload backlog: the oldest pending upload ages one minute per minute past
  # the 30-minute line. The alert fires after its 10m for-window.
  - interval: 1m
    input_series:
      - series: "profiler_upload_lag_seconds"
        values: "0+60x80" # ages one minute per minute from t=0
    alert_rule_test:
      - eval_time: 25m
        alertname: ProfilerUploadBacklogStale
        exp_alerts: [] # lag under 30m
      - eval_time: 50m
        alertname: ProfilerUploadBacklogStale
        exp_alerts:
          - exp_labels:
              severity: warning
            exp_annotations:
              summary: "Sealed parquet is not reaching S3"
              description: "The oldest pending upload has waited over 30 minutes; upload_backlog is not draining and the collector PV keeps growing."

  # A single over-budget object (№11): maintain re-skips it every pass, so
  # the counter climbs and must page; a compacting-but-busy maintainer whose
  # oversized counter stays flat must not.
  - interval: 1m
    input_series:
      - series: 'profiler_maintain_skipped_groups_total{reason="oversized"}'
        values: "0x10 1+1x50"
    alert_rule_test:
      - eval_time: 5m
        alertname: ProfilerCompactionOversizedObject
        exp_alerts: []
      - eval_time: 30m
        alertname: ProfilerCompactionOversizedObject
        exp_alerts:
          - exp_labels:
              reason: oversized
              severity: warning
            exp_annotations:
              summary: "A parquet object exceeds the compaction budget"
              description: "maintain skipped an object bigger than PROFILER_COMPACTION_MAX_BYTES; its (bucket, class) group cannot converge until the budget is raised."

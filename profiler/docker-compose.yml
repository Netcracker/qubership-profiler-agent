services:
  profiler:
    image: eclipse-temurin:21.0.11_10-jre@sha256:010e0a06bd4e0184dec58626afb3ba727b42c56c91b977e2f0a9e0837e0fa3fb
    ports:
      - "${PROFILER_HTTP_PORT:-18090}:8080"
    volumes:
      - ./build/libs:/app:ro
      - ${PROFILER_LOG_FOLDER:?Set PROFILER_LOG_FOLDER to the directory with profiler dumps}:/data/dumps:ro
    working_dir: /app
    command:
      - java
      - -Djava.awt.headless=true
      - -Dprofiler.dump=/data/dumps
      - -jar
      - /app/${PROFILER_WAR:-qubership-profiler-profiler-3.1.3-SNAPSHOT.war}
      - --httpPort
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s

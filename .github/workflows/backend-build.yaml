---
name: Backend Build

on:
  push:
    branches-ignore:
      - 'renovate/**'
    paths:
      - 'backend/**'
      - '.github/workflows/backend-build.yaml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'backend/**'
      - '.github/workflows/backend-build.yaml'

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'maven'

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod

      - name: apps-build
        env:
          SKIP_FRONTEND: Y
        # language=bash
        run: make apps-build

      - name: apps-test
        env:
          SKIP_FRONTEND: Y
        # language=bash
        run: make apps-test

      - name: tools-build
        # language=bash
        run: make tools-build

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v4.2.2

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1

      - name: Run dumps-collector Helm unit tests
        run: helm unittest charts/dumps-collector

# TODO: fix Helm violations like "name is required", "apiVersion is required", ...
#      - name: charts-build
#        # language=bash
#        run: make charts-build

      - name: examples-build
        # language=bash
        run: make examples-build

      - name: delivery-build
        # language=bash
        run: make delivery-build

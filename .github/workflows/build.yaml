---
name: Build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'maven'

      - name: apps-build
        env:
          SKIP_FRONTEND: Y
        # language=bash
        run: make apps-build

      - name: tools-build
        # language=bash
        run: make tools-build

# TODO: fix Helm violations like "name is required", "apiVersion is required", ...
#      - name: charts-build
#        # language=bash
#        run: make charts-build

      - name: examples-build
        # language=bash
        run: make examples-build

      - name: delivery-build
        # language=bash
        run: make delivery-build

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

# Declare default permissions as read-only.
permissions: read-all

concurrency:
  # On master/release, we don't want any jobs cancelled so the sha is used to name the group
  # On PR branches, we cancel the job if new commits are pushed
  # More info: https://stackoverflow.com/a/68422069/253468
  group: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' ) && format('ci-main-{0}', github.sha) || format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.MAVEN_USER }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 50
          persist-credentials: false
      - name: Checkout qubership-core-base-images
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Netcracker/qubership-core-base-images
          path: installer/build/git/qubership-core-base-images
          fetch-depth: 50
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 21
          server-id: central
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: diagtools/go.mod
      - name: Test
        uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
        with:
          multi-cache-enabled: false
          arguments: --scan --no-parallel build
      - name: Upload it-e2e diagnostics
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: ${{ failure() }}
        with:
          name: it-e2e-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            it-e2e/playwright-report/**
            it-e2e/test-results/**
            it-e2e/build/test-dump/**
            it-e2e/config/**
      - name: Publish snapshots
        uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
        if: ${{ env.CENTRAL_PORTAL_USERNAME != '' }}
        with:
          arguments: publishAllPublicationsToCentralSnapshotsRepository
          properties: |
            centralSnapshotsUsername=${{ secrets.MAVEN_USER }}
            centralSnapshotsPassword=${{ secrets.MAVEN_PASSWORD }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

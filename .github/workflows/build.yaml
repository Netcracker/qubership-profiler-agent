---
name: Build

on:
  push:
    # Can't use branches with branches-ignore
    # branches:
    #  - '**'
    branches-ignore:
      - 'renovate/**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'maven'

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: apps-build
        env:
          SKIP_FRONTEND: Y
        # language=bash
        run: make apps-build

      - name: apps-test
        env:
          SKIP_FRONTEND: Y
        # language=bash
        run: make apps-test

      - name: tools-build
        # language=bash
        run: make tools-build

# TODO: fix Helm violations like "name is required", "apiVersion is required", ...
#      - name: charts-build
#        # language=bash
#        run: make charts-build

      - name: examples-build
        # language=bash
        run: make examples-build

      - name: delivery-build
        # language=bash
        run: make delivery-build

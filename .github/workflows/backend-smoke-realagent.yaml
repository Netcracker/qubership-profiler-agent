---
name: Backend Smoke (real agent)

# Real-agent E2E: drives the actual Java profiler agent (built from this repo)
# against the docker-compose backend stack and asserts the adversarial
# method/param strings round-trip byte-exact (finding №30, focus V harness).
#
# NON-BLOCKING for now: the job is expected to FAIL until the focus-A decoder
# bugs land (readChar signedness and the empty dictionary word). The failing
# assertion is the deliverable, so continue-on-error keeps the pipeline green
# on this known failure. Flip to required after Focus A lands.

on:
  push:
    branches-ignore:
      - 'renovate/**'
    paths:
      - 'backend/**'
      - 'scripts/e2e-realagent/**'
      - '.github/workflows/backend-smoke-realagent.yaml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'backend/**'
      - 'scripts/e2e-realagent/**'
      - '.github/workflows/backend-smoke-realagent.yaml'

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  smoke-realagent:
    name: Real-agent E2E (non-blocking until Focus A)
    runs-on: ubuntu-latest
    # Known-red on the focus-A decoder bugs; do not fail the pipeline on it.
    # Flip to required after Focus A lands.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # The harness builds the Java agent and the test-app jar via Gradle.
      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'maven'

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod

      # Brings the docker-compose stack up, builds+runs the real agent, then
      # tears the stack down. docker compose ships in the runner image.
      - name: Run the real-agent E2E
        # language=bash
        run: make -C backend smoke-realagent

      - name: Dump collector logs on failure
        if: failure()
        # language=bash
        run: docker compose logs --no-color || true
